version: "3.9"

services:
  hiremind:
    build: .
    container_name: hiremind_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      # SQLite database — persists between restarts
      - ./data/hiremind.db:/app/hiremind.db
      # Knowledge base txt files
      - ./knowledge:/app/knowledge
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
